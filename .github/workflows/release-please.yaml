on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          # this assumes that you have created a personal access token
          # (PAT) and configured it as a GitHub action secret named
          # `MY_RELEASE_PLEASE_TOKEN` (this secret name is not important).
          token: ${{ secrets.MY_RELEASE_PLEASE_TOKEN }}
          # this is a built-in strategy in release-please, see "Action Inputs"
          # for more options
          release-type: simple

      - name: Checkout Repository
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v6

      - name: Generate KiCad release outputs
        if: ${{ steps.release.outputs.release_created }}
        uses: actions-for-kicad/kicad-actions@v2-k10.0
        with:
          schematic_file_name: ./train_driver.kicad_sch
          symbol_libraries: "YAAJ_BluePill_Part_Like=./libraries/Kicad-STM32/Symbols/YAAJ_BluePill_Part_Like.lib"
          run_erc: true
          schematic_output_pdf: true
          schematic_output_svg: true
          schematic_output_bom: true

      - name: Upload KiCad outputs to release
        if: ${{ steps.release.outputs.release_created }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag_name }}
          files: |
            schematic.pdf
            schematic.svg
            bom.csv
            erc.rpt
          fail_on_unmatched_files: false